<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desafio</title>
    <link rel="stylesheet" href="style.css" />  
  </head>
  <body>
    <div class="container">
      <header>
        <img src="/imagenes/Logo.png" alt="alura" />
        <h1>Encriptador</h1>
      </header>
      <div class="encriptar">
        <textarea
          name="texto"
          class="texto"
          id="texto"
          cols="30"
          rows="10"
          placeholder="Ingresa el texto aquí"
        ></textarea>

        <div class="terminos">
          <p class="info">Solo letras minúsculas y sin acentos.</p>
        </div>
        <div class="botones">
          <button class="btn-encriptar" type="button" onclick="Encriptar()">
            Encriptar
          </button>
          <button
            type="button"
            class="btn-desencriptar"
            onclick="Desencriptar()"
          >
            Desencriptar
          </button>
          <div>
            <button onclick="limpiar()" class="limpiar">Limpiar</button>
          </div>
        </div>
      </div>
      <div class="encriptado">
        <img src="imagenes/Muñeco.png" class="muneco" alt="">
        <div class="mensaje-encriptado" id="mensaje-encriptado">
          <h1 class="tituloResultado">Ningún mensaje fue encontrado</h1>
                <p class="contenidoResultado">Ingresa el texto que deseas encriptar o
                    desencriptar
                </p>
          <button class="copiar" onclick="copiar()">Copiar</button>
          
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
